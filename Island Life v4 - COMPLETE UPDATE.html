ior position, more responsibility, and an increase in income are on the table.",tip:"The strongest promotion cases are usually built before the formal title is offered.",choices:[{label:"✅ Accept the promotion",result:"The role became official. The next level of work has started.",changes:{happiness:20,stress:12},special:"career_level"},{label:"🤝 Negotiate first",result:"You asked clearly and earned a stronger starting package.",changes:{cash:1200,happiness:22,stress:10},special:"career_level"}]},{id:"grant",tags:["start_business","community"],min:2,title:"Government Grant — You Qualify",icon:"🏛️",category:"OPPORTUNITY",accent:s.green,req:{business:!0},story:"A community development grant programme opened. Your business now qualifies, but the paperwork needs to be done properly.",tip:"Small business grants are competitive, but organised documentation is often the real barrier.",choices:[{label:"📋 Do the full application",result:"The application was approved. A non-repayable grant landed with a letter of recognition.",changes:{cash:4500,communityStanding:14,intelligence:8,happiness:12,stress:5}},{label:"🤝 Pay for help with it",result:"You paid for solid documentation and still came out ahead.",changes:{cash:4100,communityStanding:10,happiness:10}}]},{id:"property_repair",tags:["buy_property","renovate"],min:1,title:"Property Maintenance Surprise",icon:"🔧",category:"PROPERTY",accent:s.teal,req:{property:!0},story:"A repair issue surfaced before it became a disaster. You can patch it cheaply, fix it properly, or delay the problem.",tip:"Property ownership rewards reserves. Maintenance is not optional; only the timing is.",choices:[{label:"✅ Fix it properly",result:"The repair was done. Your property held its value and your stress came down.",changes:{cash:-1200,stress:-8},special:"property_value_up"},{label:"🩹 Patch it for now",result:"The immediate cost stayed low, but the underlying issue did not disappear.",changes:{cash:-350,stress:5}},{label:"🙈 Ignore it",result:"It became more expensive later, exactly as the contractor warned.",changes:{cash:-1800,stress:16,propertyValue:-1200}}]},{id:"child_school",tags:["family_time"],min:1,title:"Your Child Needs Support",icon:"🎒",category:"FAMILY",accent:s.gold,req:{children:1},story:"A teacher flagged that one of your children could benefit from more support and time at home. It is manageable now, but not if it is ignored.",tip:"Small, consistent parental support often matters more than one large intervention later.",choices:[{label:"📚 Make room and get help",result:"You reorganised the week and put real support around your child.",changes:{cash:-450,relationships:16,happiness:10,stress:5}},{label:"💬 Talk with the teacher and plan",result:"You built a practical plan before the issue became bigger.",changes:{relationships:10,intelligence:5}},{label:"💼 Keep the current pace",result:"The issue was not solved. The distance at home became easier to feel.",changes:{relationships:-14,stress:8}}]},{id:"recovery",tags:["lime","festival"],min:1,title:"The Pattern Is Getting Louder",icon:"🕊️",category:"HEALTH",accent:s.orange,req:{addiction:!0},story:"Friends are beginning to notice the habits you keep explaining away. There is still time to interrupt the pattern.",tip:"Recovery is stronger when it is concrete: support, boundaries, treatment, and a changed routine.",choices:[{label:"🧭 Ask for help now",result:"You told the truth to someone safe and created an actual plan.",changes:{happiness:12,stress:-15},special:"recovery_step"},{label:"😶 Keep it private",result:"You said you had it under control. The next few months tested that claim.",changes:{stress:8},special:"addiction_up"}]},{id:"creator_viral",tags:["post_content","develop_creative"],min:2,title:"Your Content Starts Moving",icon:"📲",category:"CREATOR",accent:s.violet,story:"One piece of content connected. The comments are different now: people are sharing it, asking questions, and following the story.",tip:"A viral moment is an opportunity, not a business model. Consistency decides whether it becomes a platform.",choices:[{label:"🎥 Build a content system",result:"You turned attention into a repeatable routine instead of chasing one moment.",changes:{stress:8,creative:8},fame:8e3},{label:"💰 Take a quick sponsored post",result:"You earned from the moment, but some followers felt the fit was rushed.",changes:{cash:1800,integrity:-4},fame:3e3}]},{id:"friend_loan",tags:["lime","family_time","festival"],min:1,sev:"DRAMA",title:"Your Friend Needs Money",icon:"📱",category:"FRIENDS",accent:s.pink,story:"A close friend calls on a Wednesday night. He is short on rent and has never asked before. Something in his voice says this is real. He says he will pay it back.",tip:"Lending money to a friend changes the dynamic of the friendship regardless of whether it gets repaid. Decide what the friendship is worth before deciding about the money.",choices:[{label:"💰 Lend the full amount",result:"You sent it that night. He paid back most of it after three months. The remaining balance became an unspoken thing. The friendship survived but changed.",changes:{cash:-1800,relationships:12,happiness:6,integrity:8}},{label:"💸 Give half — no expectation of repayment",result:"You gave $900 and told him not to worry about returning it. The friendship stayed clean. He remembered.",changes:{cash:-900,relationships:18,happiness:10,integrity:12}},{label:"❌ Cannot do it right now",result:"You declined. He said he understood. These moments always cost something either way.",changes:{stress:6,integrity:-4,relationships:-8}}]},{id:"friend_biz",tags:["network","market_stall","cook_sell","freelance"],min:1,sev:"PROFIT",title:"Old School Friend Has a Pitch",icon:"💡",category:"FRIENDS",accent:s.green,story:"Someone from secondary school, out of contact for years, calls with a business pitch. He has a growing food and events operation and wants you as a partner. The pitch is solid. The trust question is real.",tip:"Business partnerships are legal marriages. The trust, the terms, and the exit strategy all need to be clear before you say yes.",choices:[{label:"🤝 Jump in — take the stake",result:"You joined. The first three months were rough. By month six, revenue started moving. This might be the one.",changes:{cash:-1500,happiness:16,stress:14,communityStanding:8,intelligence:6}},{label:"🔍 Ask to see the financials first",result:"You requested a formal review before committing. He was slightly offended. The numbers were actually solid. You joined on better terms.",changes:{intelligence:10,relationships:5,stress:5}},{label:"❌ Not this one",result:"Your instinct said no. You said no. Those instincts exist for a reason.",changes:{integrity:6,stress:-4}}]},{id:"friend_jealous",tags:["overdeliver","network","promotion"],min:2,sev:"DRAMA",title:"The Jealousy Starting to Show",icon:"😤",category:"FRIENDS",accent:s.orange,story:"Someone you have known for years made a comment at a gathering that landed differently than a joke. Then another one. Then you heard through someone else what he said when you were not in the room. Success changes friendships.",tip:"Not everyone can celebrate your progress. That is their limitation, not yours. Distance from negativity is not abandonment — it is self-preservation.",choices:[{label:"🗣️ Address it directly",result:"Uncomfortable conversation. He half-admitted it. The friendship reset to something more honest.",changes:{relationships:6,stress:-8,integrity:8}},{label:"😌 Pull back quietly and keep building",result:"You said nothing. The relationship faded. You freed up mental space you did not know was being used.",changes:{stress:-10,happiness:6,communityStanding:4}},{label:"🤝 Bring him into something you are working on",result:"Jealousy often comes from feeling left behind. You included him. He responded well.",changes:{relationships:14,communityStanding:8,stress:5}}]},{id:"friend_trouble",tags:["lime","perform","festival"],min:1,sev:"DANGER",title:"Your Friend Is in Serious Legal Trouble",icon:"🚨",category:"FRIENDS",accent:s.coral,story:"A call at 11pm. A friend you grew up with is in a legal situation and asking you to vouch for him, speak to his character, and provide an alibi for a night you remember differently. Loyalty is real. So are perjury charges.",tip:"Standing by a friend and becoming part of their legal problem are different things. Know which one is actually being asked of you.",choices:[{label:"⚖️ Tell only the truth — no fabrication",result:"You gave an honest character reference. You told them what you actually knew. Your friend was disappointed. Your integrity stayed intact.",changes:{integrity:20,relationships:-10,stress:15,communityStanding:8}},{label:"🤐 Stay completely out of it",result:"You told him you could not be involved. He called you a coward. The friendship ended that night.",changes:{integrity:8,relationships:-18,stress:10,happiness:-8}},{label:"🙏 Full support — whatever he needs",result:"You stepped in completely. The situation resolved this time. But you are in that world now whether you chose to be or not.",changes:{integrity:-22,relationships:14,stress:22,communityStanding:-12}}]},{id:"cowork_rumor",tags:["overdeliver","upskill","promotion"],min:2,sev:"DANGER",title:"A Rumour Is Spreading at Work",icon:"👥",category:"WORKPLACE",accent:s.coral,story:"Someone at the office is telling a version of events that makes you look bad. You do not know exactly who. But the whisper is moving — you can feel it in the room temperature, in how a manager looked at you this week.",tip:"Workplace reputations move faster than corrections. Address it early and directly rather than hoping it fades on its own.",choices:[{label:"🗣️ Find the source and address it",result:"It took two difficult conversations. The spreading stopped. Your directness got noticed by the right people.",changes:{stress:10,relationships:8,integrity:10,intelligence:6}},{label:"📈 Out-perform it — let the work speak",result:"You raised your output and visibility. Within a month the narrative shifted. Actions are louder than denials.",changes:{workEthic:8,stress:8,relationships:5,intelligence:5}},{label:"💼 Start quietly looking for another role",result:"You made the assessment that this environment was no longer safe and began preparing an exit.",changes:{stress:12,intelligence:8,relationships:-5,happiness:5}}]},{id:"boss_meeting",tags:["overdeliver","upskill","promotion"],min:1,sev:"DRAMA",title:"The Boss Wants to See You — No Agenda",icon:"🚪",category:"WORKPLACE",accent:s.gold,story:"The calendar invite came with no title and came from the boss directly. The meeting is in 20 minutes. You do not know if this is the best or worst news of your working year.",tip:"The difference between a promotion conversation and a performance conversation is usually the preparation you did in the weeks before.",choices:[{label:"👔 Walk in knowing your value",result:"It was a promotion conversation. You were ready. You negotiated well. It landed.",changes:{cash:2400,happiness:18,stress:-5,communityStanding:6},special:"career_level"},{label:"😰 Walk in and improvise",result:"It was a feedback conversation. You were not ready. You recovered but left points on the table.",changes:{stress:12,intelligence:8,happiness:-5}}]},{id:"cowork_steal",tags:["overdeliver","upskill"],min:2,sev:"DANGER",title:"A Colleague Took Credit for Your Work",icon:"😤",category:"WORKPLACE",accent:s.coral,story:"The presentation happened. The praise went to someone else. A colleague presented work built significantly on your analysis and your late nights and took the standing ovation while you watched from the third row.",tip:"How you handle this moment will define your professional reputation more than the work itself did.",choices:[{label:"🗣️ Speak up — document your contribution",result:"You raised it professionally with evidence. It was uncomfortable for everyone. The record was corrected.",changes:{stress:14,integrity:16,relationships:5,intelligence:6}},{label:"😌 Let it go — protect the peace",result:"You swallowed it. You started documenting everything from this point forward. Lesson learned.",changes:{stress:6,integrity:-6,happiness:-8,intelligence:8}},{label:"📝 Start building your own visible path",result:"This was the moment you decided the answer was not in that building. You started your exit strategy.",changes:{stress:8,intelligence:10,happiness:5}}]},{id:"cowork_collab",tags:["network","freelance","study_tech","develop_creative"],min:1,sev:"PROFIT",title:"Colleague Wants to Go Freelance Together",icon:"💼",category:"WORKPLACE",accent:s.green,story:"One of the sharpest people in your department is leaving and wants you to come with her — not to join another company, but to start something. She has the client pipeline. You have the skills. You have a week to decide.",tip:"The right partner at the right time can compress ten years of solo building into three. The wrong one can compress your savings just as fast.",choices:[{label:"🚀 Go — this is the window",result:"You resigned on Friday. By Monday you were building. The first six months were terrifying and exact.",changes:{cash:-1e3,happiness:20,stress:18,intelligence:10,communityStanding:8}},{label:"🔍 Negotiate your terms before you commit",result:"You stayed two more months, sorted your finances, and joined on terms that protected you.",changes:{intelligence:12,stress:5,cash:-500,happiness:12}},{label:"❌ Not ready to leave stable income",result:"You declined. She understood. The opportunity passed. You watched what she built from inside the office.",changes:{stress:-6,happiness:-8,intelligence:5}}]},{id:"salary_truth",tags:["network","overdeliver"],min:1,sev:"DRAMA",title:"You Found Out What Colleagues Earn",icon:"💰",category:"WORKPLACE",accent:s.orange,story:"Someone left a payslip on the printer. Or the conversation happened at an after-work drink when people were honest for once. Either way — you know what three colleagues earn. One of them does the same work as you and earns $800 more per month.",tip:"Knowing your market value is not being greedy. It is basic financial literacy. The negotiation conversation is overdue.",choices:[{label:"💼 Book a meeting and renegotiate now",result:"You walked in with data, market benchmarks, and a clear ask. They came up $600. Not everything but real money.",changes:{cash:600,stress:8,happiness:12,intelligence:8}},{label:"🔍 Research the full market first",result:"You spent two months building a comparison case. When you went in you had numbers they could not argue with.",changes:{intelligence:12,stress:5,cash:900}},{label:"😤 Start looking for a better-paying role",result:"You started the job search. Within three months you had an offer that made the current salary look like tuition.",changes:{intelligence:8,stress:12,happiness:5}}]},{id:"stranger_pitch",tags:["lime","network","festival"],min:1,sev:"DRAMA",title:"A Stranger at a Party Has a Pitch",icon:"🤔",category:"STRANGER",accent:s.turquoise,story:"You did not plan to have a business conversation tonight. But this man — confident, well-dressed, knows everyone in the room — has been explaining an investment opportunity for twenty minutes. The numbers sound good. The urgency is suspicious.",tip:"If someone is pitching you urgently and personally at a social event, that urgency is almost always manufactured. Real opportunities do not expire at midnight.",choices:[{label:"🔍 Ask for formal documentation — meet properly",result:"He followed up. The documents were real but the returns were overstated. You invested modestly with eyes open.",changes:{intelligence:10,cash:-500,stress:5}},{label:"💰 Trust your gut — commit tonight",result:"You put in $2,000. The venture was legitimate but underperformed. $800 came back six months later.",changes:{cash:-1200,intelligence:8,stress:8}},{label:"🚶 Walk away — the energy is wrong",result:"You politely excused yourself. Two people at that party lost significant money. Your instinct was right.",changes:{intelligence:8,integrity:6,stress:-5}}]},{id:"chance_encounter",tags:["network","community","festival"],min:1,sev:"PROFIT",title:"A Chance Encounter That Changes Things",icon:"✨",category:"STRANGER",accent:s.gold,story:"You were in the wrong queue, took the wrong seat, or ran into traffic and stopped for coffee — and ended up in a two-hour conversation with someone who runs exactly the operation you have been trying to get access to.",tip:"The Caribbean professional network operates through personal trust more than formal channels. One genuine conversation with the right person is worth a hundred cold emails.",choices:[{label:"📱 Follow up the next morning",result:"You sent a message at 9am. Meeting confirmed by 11am. The door opened.",changes:{relationships:18,communityStanding:12,happiness:14,intelligence:8,cash:1e3}},{label:"⏳ Wait a few days — do not seem eager",result:"You waited four days. They had moved on. You got a brief call and a generic referral.",changes:{relationships:6,intelligence:5}}]},{id:"witness",tags:["lime","community","faith"],min:1,sev:"DANGER",title:"You Saw Something You Were Not Meant to See",icon:"👁️",category:"STRANGER",accent:s.coral,story:"Coming back from an errand, you witnessed something that was clearly not meant for your eyes — involving people who have reach in this community. No one saw you see it. But you are standing here now, knowing what you know.",tip:"On a small island, silence and speech both carry consequences. The question is which ones you can live with.",choices:[{label:"🚶 Say nothing — you saw nothing",result:"You kept walking. You kept your mouth closed. The weight of that is yours to carry. The safety is also yours.",changes:{integrity:-8,stress:14,happiness:-8}},{label:"⚖️ Report it to the right authority",result:"You filed a report. It was taken seriously. It cost you stress and temporary vulnerability. Your conscience stayed clean.",changes:{integrity:20,stress:20,communityStanding:14,happiness:5}},{label:"🤐 Tell one trusted person only",result:"You told someone you trust completely. The weight became lighter. The secret stayed contained.",changes:{stress:-6,integrity:-3,relationships:8}}]},{id:"street_help",tags:["community","faith","family_time"],min:1,sev:"DRAMA",title:"Someone Needs Help Right in Front of You",icon:"🙏",category:"STRANGER",accent:s.teal,story:"An elderly woman struggling at the bus stop. A man who fainted on a street corner. A young mother counting coins at a shop counter short of her total. Small moments. Real people. The kind you can choose to walk past or stop for.",choices:[{label:"🤝 Stop — help without hesitation",result:"You stopped. Five minutes of your life that meant everything to someone else. The island saw it. You felt it.",changes:{communityStanding:14,happiness:16,integrity:10}},{label:"😌 You are in a rush right now",result:"You kept moving and have thought about it since. These small moments accumulate into who you actually are.",changes:{integrity:-5,stress:3}}]},{id:"overhear",tags:["network","market_stall","lime"],min:1,sev:"PROFIT",title:"You Overheard Something Valuable",icon:"👂",category:"STRANGER",accent:s.green,story:"Two people at the next table were talking freely about a business deal — a contract coming, a vendor slot opening, an investment round. Information that could benefit you directly if you act on it correctly.",tip:"Information is the Caribbean business advantage. What you do with it is as much a character test as a financial one.",choices:[{label:"📱 Act on it immediately",result:"You made a move based on what you heard. It landed. The timing was everything.",changes:{cash:1800,happiness:12,intelligence:8,stress:6}},{label:"🤔 Verify first then act",result:"Two days confirming before moving. Slightly less upside, significantly less risk.",changes:{cash:1e3,intelligence:10,stress:4}},{label:"🤐 Leave it — not yours to act on",result:"You left it alone. Clean conscience. No upside. The choice you can live with.",changes:{integrity:8,stress:-3}}]},{id:"break_in",tags:["buy_property","start_business","market_stall"],min:1,sev:"DANGER",title:"Your Property Was Targeted",icon:"🚨",category:"DANGER",accent:s.coral,story:"You got the call at 6:47 in the morning. Someone broke into your car or the business overnight and took equipment. The lock is broken. The window is gone. The police report is filed. Whether you have insurance is the question of the next 48 hours.",tip:"Business insurance and contents insurance exist for exactly this moment. If this is the first time you are thinking about it, it is the right time to act.",choices:[{label:"🔒 Upgrade security and get proper insurance",result:"You spent money but closed the vulnerability. Better physical security and a proper insurance policy now exist.",changes:{cash:-1200,stress:15,happiness:-5,intelligence:8}},{label:"📋 File the insurance claim",result:"Insurance covered most of the loss. The process was slow. But you were covered.",changes:{cash:-400,stress:10}},{label:"💸 Absorb the loss and get back to work",result:"You cleaned up and kept moving. The loss stings. The resilience is real.",changes:{cash:-2200,stress:12,workEthic:8,happiness:-8}}]},{id:"extortion",tags:["start_business","market_stall","overdeliver"],min:1,sev:"DANGER",title:"Someone Is Trying to Shake You Down",icon:"⚠️",category:"DANGER",accent:s.coral,story:"A man came to the business. He was polite in the way people who are not polite are polite when they want something. He mentioned a figure. He mentioned a name. He said he would come back Friday. You did not agree to anything.",tip:"Extortion thrives on silence. Paying once confirms that the leverage works and guarantees a return visit.",choices:[{label:"👮 Report it immediately",result:"You went to the police before Friday. The situation was handled. The courage to report it was noted in this community.",changes:{stress:20,integrity:22,communityStanding:14,happiness:5}},{label:"💰 Pay — make it go away",result:"You paid. He came back two months later with a higher figure. The first payment was the worst decision.",changes:{cash:-2e3,integrity:-20,stress:15,communityStanding:-8}},{label:"🤝 Mobilise your community network",result:"You made calls. The right people knew. The man never came back. The community closed around you.",changes:{communityStanding:22,relationships:14,integrity:12,stress:8}}]},{id:"false_accusation",tags:["overdeliver","network","promotion","start_business"],min:2,sev:"DANGER",title:"You Are Being Falsely Accused",icon:"💔",category:"DANGER",accent:s.coral,story:"A complaint was filed about your conduct. It is not true. The institution taking the complaint seriously is doing its job. You understand that. What you do not understand is how to defend yourself against something that is not real.",tip:"Documentation is your only defence in formal processes. Every claim needs a paper trail on both sides.",choices:[{label:"⚖️ Get a lawyer — this is serious",result:"Legal representation changed the dynamic immediately. The process was slow and expensive. The outcome was clean.",changes:{cash:-2500,stress:18,integrity:14,intelligence:8}},{label:"📝 Document everything and fight it yourself",result:"Three weeks of comprehensive evidence-building. Exhausting. It worked.",changes:{stress:22,intelligence:12,integrity:12,happiness:-10}},{label:"🤐 Stay quiet and let it resolve",result:"You said nothing. The process ran without your input. The resolution was messy and partial.",changes:{stress:15,integrity:-8,happiness:-12,communityStanding:-8}}]},{id:"health_warning",tags:["overdeliver","upskill","network"],min:2,sev:"DANGER",title:"Your Body Is Sending Warnings",icon:"💔",category:"HEALTH",accent:s.coral,story:"Third week in a row waking up tired after eight hours. Headaches are regular now. Your right arm went numb during a meeting for about forty seconds. You laughed it off but it shook you. You have been here before and ignored it.",tip:"Caribbean men have among the highest rates of undiagnosed hypertension in the world. The symptom before the crisis is the one that matters.",choices:[{label:"🏥 Book the doctor — today",result:"Hypertension caught early. Medication started. Lifestyle changes made. This was the best decision you made all year.",changes:{health:22,stress:-12,cash:-400,happiness:10}},{label:"💊 Buy something from the pharmacy",result:"You self-medicated and made some changes. Better than nothing. Not better than an actual checkup.",changes:{health:8,cash:-80,stress:-5}},{label:"😌 It will pass",result:"It did not pass. It is going to ask you properly in six months.",changes:{health:-12,stress:8,happiness:-6}}]},{id:"car_accident",tags:["lime","festival","network"],min:1,sev:"DRAMA",title:"A Collision on the Way Home",icon:"🚗",category:"DANGER",accent:s.orange,story:"Coming home from an event — a fender bender at a junction. The other driver is already on the phone. Whether you are at fault or not, you are about to spend the next two hours standing on a roadside sorting out what happens next.",tip:"Third-party vehicle insurance is the legal minimum but comprehensive cover is the financial minimum that makes sense.",choices:[{label:"📋 Handle it properly — police report and insurance",result:"Took three hours. Cost some money. The documentation protected you. Everything resolved cleanly.",changes:{cash:-600,stress:14,intelligence:6}},{label:"💰 Settle it privately right now",result:"You agreed a number on the spot and both moved on. Faster. Less certain.",changes:{cash:-800,stress:6}},{label:"🚗 Drive off — no one was badly hurt",result:"You left. The other driver had your plate. The situation came back more expensively than it needed to.",changes:{cash:-1400,integrity:-14,stress:18}}]},{id:"international_contract",tags:["study_tech","freelance","network","develop_creative"],min:2,sev:"PROFIT",title:"Work Offer From Off-Island",icon:"🌍",category:"OPPORTUNITY",accent:s.gold,story:"An email arrived Tuesday morning from a company in Miami. They found your work through a referral and want you for a three-month contract. The rate is four times what you earn locally. The work is fully remote. You would not have to leave.",tip:"Caribbean freelancers consistently underprice compared to North American and European markets. The international rate for your skills is not a ceiling — it is a floor.",choices:[{label:"✅ Accept — this is why you built these skills",result:"Contract signed. The rate hit your account in a different currency for the first time. Your relationship with money changed.",changes:{cash:8e3,happiness:22,stress:10,intelligence:8,communityStanding:10}},{label:"💰 Negotiate the rate before you accept",result:"You pushed for 20% more and got 15%. First international contract and you already negotiated it upward.",changes:{cash:9200,happiness:24,stress:10,intelligence:10}}]},{id:"investment_return",tags:["invest","save","risky"],min:1,sev:"PROFIT",title:"An Investment Paid Off Significantly",icon:"📈",category:"FINANCE",accent:s.gold,story:"The position you took moved. Not a little. A lot. The return came in and you had to check the number three times. This is what patient investment looks like when the market works.",tip:"This moment is a test. The worst thing most people do when an investment wins is spend the return immediately. Reinvest at least 70%.",choices:[{label:"📈 Reinvest 70% — let it compound",result:"You took 30% to enjoy and put 70% back to work. The discipline here is the whole game.",changes:{cash:5500,happiness:18,intelligence:10,stress:-8}},{label:"🎉 Enjoy it — you earned this",result:"You celebrated. The money went on things that mattered. The lesson about reinvesting arrived the following year.",changes:{cash:2e3,happiness:26,relationships:10,stress:-12}}]},{id:"inheritance",tags:["family_time","faith"],min:1,sev:"PROFIT",title:"An Unexpected Inheritance",icon:"📜",category:"FAMILY",accent:s.gold,story:"A distant relative passed away. The call came from a lawyer. They left you something real — not a fortune, but meaningful cash and a piece of land that has been in the family for decades. You did not expect this.",tip:"Inherited wealth has a high destruction rate within one generation. What you do with it is as important as receiving it.",choices:[{label:"🏦 Bank the cash — hold the land",result:"You kept both and let time pass before deciding. Patience with unexpected windfalls is itself a strategy.",changes:{cash:6e3,happiness:14,intelligence:8,stress:-5}},{label:"💸 Sell everything — take the liquidity",result:"Liquid is flexible. You took the cash and invested it directly.",changes:{cash:9e3,happiness:12,stress:-5}}]},{id:"gov_grant",tags:["start_business","community","market_stall"],min:1,sev:"PROFIT",title:"Government Grant — You Qualify",icon:"🏛️",category:"OPPORTUNITY",accent:s.green,req:{business:!0},story:"A community development grant programme opened. Your business qualifies on every criterion. The grant is $4,500 — non-repayable. The application requires documentation, a business plan summary, and a community impact statement.",tip:"Caribbean governments have active small business support programmes that most eligible entrepreneurs never access because they do not know they exist.",choices:[{label:"📋 Apply properly — do the full work",result:"Application submitted. Six weeks. Grant approved. The recognition letter came with the cash.",changes:{cash:4500,communityStanding:14,intelligence:8,happiness:12,stress:5}},{label:"🤝 Pay someone to help with the application",result:"You paid $400 for solid documentation and still came out ahead by $4,100.",changes:{cash:4100,communityStanding:10,happiness:10}}]},{id:"buyout_offer",tags:["start_business","market_stall"],min:1,sev:"PROFIT",title:"Someone Wants to Buy Your Business",icon:"🤝",category:"BUSINESS",accent:s.gold,req:{business:!0},story:"A larger operation has been watching what you built. They reached out through a mutual contact with a number attached. The offer is meaningful. Selling means liquidity and freedom. Not selling means staying in the fight.",tip:"The first offer is rarely the best offer. Get a second opinion from someone with no stake in the outcome before you respond.",choices:[{label:"💰 Negotiate hard — counter higher",result:"You pushed aggressively. They came back at 70% of your counter. A significant exit.",changes:{cash:18e3,happiness:20,stress:-10}},{label:"❌ Not selling — this is long term",result:"You declined. The offer validated everything you were building. The motivation jumped.",changes:{happiness:14,workEthic:10,stress:5,communityStanding:8}},{label:"🤔 Get a proper valuation first",result:"The professional valuator put the number 40% higher than their opening offer. New negotiation started from a better position.",changes:{cash:22e3,intelligence:10,stress:8,happiness:18}}]},{id:"cricket",tags:["lime","family_time","festival","faith"],min:1,sev:"DRAMA",title:"West Indies Playing Tonight",icon:"🏏",category:"CULTURE",accent:s.green,story:"West Indies are playing tonight. Your phone is buzzing with the group chat. Work is still on the desk. Somehow this has become a real decision that touches family, community, and personal joy all at once.",choices:[{label:"🏏 Watch it with the family",result:"Three hours together. The match was close. The conversation around it was better. These are the evenings people remember.",changes:{happiness:22,relationships:18,stress:-16,cash:-50}},{label:"📱 Follow the score while working",result:"Half present at everything is the same as fully present at nothing.",changes:{workEthic:5,stress:5,relationships:-6,happiness:-8}},{label:"🌙 Skip it — bigger priorities right now",result:"You focused. The family watched without you. Some things cannot be replayed.",changes:{stress:3,relationships:-10,happiness:-5}}]},{id:"rum_shop_intelligence",tags:["lime","community","festival"],min:1,sev:"DRAMA",title:"The Rum Shop Has Opinions",icon:"🍺",category:"COMMUNITY",accent:s.orange,story:"Friday e
